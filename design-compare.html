<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计对比 — 播客私教落地页</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0F0F0F;
    color: #E8E8E8;
    font-family: "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #141414;
  }

  .header-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .header-sub {
    font-size: 12px;
    color: #666;
    margin-top: 2px;
  }
  .header-links {
    display: flex;
    gap: 12px;
  }
  .header-links a {
    padding: 6px 16px;
    border-radius: 4px;
    font-size: 12px;
    text-decoration: none;
    color: #999;
    border: 1px solid rgba(255,255,255,0.1);
    transition: color 0.15s, border-color 0.15s;
  }
  .header-links a:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

  .columns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    height: calc(100vh - 80px);
  }

  .col {
    border-right: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
  }
  .col:last-child { border-right: none; }

  .col-header {
    padding: 14px 20px 12px;
    background: #1A1A1A;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .col-label {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .col-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .col-name { font-size: 13px; font-weight: 600; }
  .col-desc { font-size: 11px; color: #666; margin-top: 1px; }

  .col-header a {
    font-size: 11px;
    color: #555;
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 3px;
    transition: color 0.15s, border-color 0.15s;
  }
  .col-header a:hover { color: #ccc; border-color: rgba(255,255,255,0.2); }

  iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }

  .col-a .col-dot { background: #C8A044; }
  .col-b .col-dot { background: #FF5B3A; }
  .col-c .col-dot { background: #1B4332; }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">播客私教落地页 — 设计方向对比</div>
    <div class="header-sub">3 个风格变体 · 点击"新标签打开"在浏览器里单独查看每个变体</div>
  </div>
  <div class="header-links">
    <a href="variant-A-warm-paper.html" target="_blank">单开 A</a>
    <a href="variant-B-broadcast.html" target="_blank">单开 B</a>
    <a href="variant-C-minimal.html" target="_blank">单开 C</a>
  </div>
</header>

<div class="columns">

  <div class="col col-a">
    <div class="col-header">
      <div class="col-label">
        <span class="col-dot"></span>
        <div>
          <div class="col-name">变体 A — 温暖纸感</div>
          <div class="col-desc">暖米白 · 砖红 · 书房质感 · 新中式</div>
        </div>
      </div>
      <a href="variant-A-warm-paper.html" target="_blank">新标签打开 ↗</a>
    </div>
    <iframe src="variant-A-warm-paper.html" title="变体 A — 温暖纸感"></iframe>
  </div>

  <div class="col col-b">
    <div class="col-header">
      <div class="col-label">
        <span class="col-dot"></span>
        <div>
          <div class="col-name">变体 B — 播客电台</div>
          <div class="col-desc">深海蓝 · 珊瑚橙 · 声波纹 · 创作者能量</div>
        </div>
      </div>
      <a href="variant-B-broadcast.html" target="_blank">新标签打开 ↗</a>
    </div>
    <iframe src="variant-B-broadcast.html" title="变体 B — 播客电台"></iframe>
  </div>

  <div class="col col-c">
    <div class="col-header">
      <div class="col-label">
        <span class="col-dot"></span>
        <div>
          <div class="col-name">变体 C — 知识付费极简</div>
          <div class="col-desc">纯白 · 深绿 · 信息密度 · 得到质感</div>
        </div>
      </div>
      <a href="variant-C-minimal.html" target="_blank">新标签打开 ↗</a>
    </div>
    <iframe src="variant-C-minimal.html" title="变体 C — 知识付费极简"></iframe>
  </div>

</div>

</body>
</html>
